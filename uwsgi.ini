[uwsgi]
module = config.wsgi:application
chdir = /var/www/kids

master = true
processes = 4
threads = 2

socket = /var/www/kids/kids.sock
chmod-socket = 660
vacuum = true

die-on-term = true
harakiri = 60
max-requests = 1000

buffer-size = 32768

logto = /var/www/kids/logs/uwsgi.log
log-date = true

venv = /var/www/kids/venv

env = DJANGO_SETTINGS_MODULE=config.settings
